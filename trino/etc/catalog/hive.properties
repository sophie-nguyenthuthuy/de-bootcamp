connector.name=hive

# Hive Metastore service (tên service trong docker-compose)
hive.metastore.uri=thrift://hive-metastore:9083

# Cấu hình S3-compatible cho MinIO
hive.s3.aws-access-key=minioadmin
hive.s3.aws-secret-key=minioadmin
hive.s3.endpoint=http://minio:9000
hive.s3.path-style-access=true
hive.s3.ssl.enabled=false

# Optional: tăng performance
hive.s3.max-connections=50
hive.s3.connect-timeout=2m
hive.s3.socket-timeout=2m

# Cho phép tạo schema/tables nếu chưa có
hive.metastore.username=hive
hive.allow-drop-table=true
